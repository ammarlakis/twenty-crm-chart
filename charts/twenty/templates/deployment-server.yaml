apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "twenty.fullname" . }}-server
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "twenty.labels" . | nindent 4 }}
    app.kubernetes.io/component: server
  {{- with .Values.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  replicas: {{ .Values.server.replicaCount }}
  selector:
    matchLabels:
      {{- include "twenty.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: server
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        {{- include "twenty.labels" . | nindent 8 }}
        app.kubernetes.io/component: server
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- with .Values.server.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- if or .Values.podAnnotations .Values.server.podAnnotations }}
      annotations:
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- with .Values.server.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "twenty.serviceAccountName" . }}
      automountServiceAccountToken: {{ .Values.serviceAccount.automount }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- with .Values.priorityClassName }}
      priorityClassName: {{ . | quote }}
      {{- end }}
      {{- with .Values.runtimeClassName }}
      runtimeClassName: {{ . | quote }}
      {{- end }}
      volumes:
        {{- if .Values.server.dockerDataPersistence.enabled }}
        - name: docker-data
          persistentVolumeClaim:
            claimName: {{ include "twenty.fullname" . }}-docker-data
        {{- end }}
        {{- if .Values.server.persistence.enabled }}
        - name: server-data
          persistentVolumeClaim:
            claimName: {{ include "twenty.fullname" . }}-server
        {{- end }}
      initContainers:
        - name: wait-for-db
          image: postgres:16-alpine
          command:
            - sh
            - -c
            - |
              until pg_isready -h {{ .Values.database.host }} -p {{ .Values.database.port }} -U {{ .Values.database.user }}; do
                echo "Waiting for database socket..."
                sleep 2
              done
      containers:
        - name: server
          image: {{ include "twenty.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.server.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if .Values.frontend.overrideServerBaseUrl }}
          command:
            - sh
            - -c
            - |
              node dist/main &
              pid="$!"
              trap 'kill -TERM "$pid"; wait "$pid"' TERM INT

              (
                for _ in $(seq 1 180); do
                  if grep -q "REACT_APP_SERVER_BASE_URL" /app/packages/twenty-server/dist/front/index.html 2>/dev/null; then
                    sed -i -E 's#"REACT_APP_SERVER_BASE_URL": "[^"]*"#"REACT_APP_SERVER_BASE_URL": {{ .Values.frontend.serverBaseUrl | quote }}#' /app/packages/twenty-server/dist/front/index.html
                  fi
                  sleep 1
                done
              ) &

              wait "$pid"
          {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.server.service.port }}
              protocol: TCP
          env:
            - name: NODE_PORT
              value: {{ .Values.server.service.port | quote }}
            - name: SERVER_URL
              value: {{ .Values.serverUrl | quote }}
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.database.passwordSecret.name }}
                  key: {{ .Values.database.passwordSecret.key }}
            - name: PG_DATABASE_URL
              value: {{ include "twenty.databaseUrl" . | quote }}
            - name: REDIS_URL
              value: {{ .Values.redisUrl | quote }}
            - name: ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "twenty.encryptionSecretName" . }}
                  key: {{ .Values.secrets.encryption.key }}
            {{- if and (not .Values.secrets.encryption.existingSecret) .Values.secrets.encryption.fallbackEncryptionKey }}
            - name: FALLBACK_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "twenty.encryptionSecretName" . }}
                  key: fallbackEncryptionKey
            {{- end }}
            - name: DISABLE_DB_MIGRATIONS
              value: {{ ternary "true" "false" .Values.migrations.enabled | quote }}
            {{- range $name, $value := .Values.server.env }}
            - name: {{ $name }}
              value: {{ $value | quote }}
            {{- end }}
            {{- with .Values.server.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.server.envFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          livenessProbe:
            {{- toYaml .Values.server.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.server.readinessProbe | nindent 12 }}
          startupProbe:
            {{- toYaml .Values.server.startupProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.server.resources | nindent 12 }}
          volumeMounts:
            {{- if .Values.server.dockerDataPersistence.enabled }}
            - name: docker-data
              mountPath: /app/docker-data
            {{- end }}
            {{- if .Values.server.persistence.enabled }}
            - name: server-data
              mountPath: /app/packages/twenty-server/.local-storage
            {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
