{{- $accessToken := include "twenty.secretValue" (dict "context" . "secretName" (include "twenty.tokenSecretName" .) "key" "accessToken" "provided" .Values.secrets.tokens.accessToken) -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "twenty.tokenSecretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "twenty.labels" . | nindent 4 }}
    app.kubernetes.io/component: tokens
type: Opaque
stringData:
  accessToken: {{ $accessToken | quote }}
