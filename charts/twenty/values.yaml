fullnameOverride: ""

image:
  repository: twentycrm/twenty
  tag: ""
  pullPolicy: IfNotPresent

serverUrl: ""

frontend:
  overrideServerBaseUrl: false
  serverBaseUrl: ""

server:
  replicaCount: 1
  service:
    type: ClusterIP
    port: 3000
  persistence:
    enabled: true
    size: 10Gi
    storageClass: ""
    accessModes:
      - ReadWriteOnce
  dockerDataPersistence:
    enabled: true
    size: 100Mi
    storageClass: ""
    accessModes:
      - ReadWriteOnce
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1024Mi
  env:
    SIGN_IN_PREFILLED: "false"
    STORAGE_TYPE: local
    ACCESS_TOKEN_EXPIRES_IN: 7d
    LOGIN_TOKEN_EXPIRES_IN: 1h
    API_RATE_LIMITING_SHORT_LIMIT: "100"
    API_RATE_LIMITING_SHORT_TTL_IN_MS: "1000"
    IS_MULTIWORKSPACE_ENABLED: "false"
    DEFAULT_SUBDOMAIN: app
    IS_WORKSPACE_CREATION_LIMITED_TO_SERVER_ADMINS: "true"

worker:
  replicaCount: 1
  command:
    - yarn
    - worker:prod
  resources:
    requests:
      cpu: 250m
      memory: 1024Mi
    limits:
      cpu: 1000m
      memory: 2048Mi

database:
  host: ""
  port: 5432
  user: twenty_app_user
  name: twenty
  passwordSecret:
    name: ""
    key: password

redisUrl: redis://twenty-redis-master.apps.svc.cluster.local:6379

secrets:
  tokens:
    name: twenty-tokens
    accessToken: ""

podSecurityContext:
  runAsUser: 1000
  fsGroup: 1000

nodeSelector: {}
tolerations: []
affinity: {}
