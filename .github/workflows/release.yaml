name: Release Charts

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_name:
        description: "Release tag to publish, for example v0.1.0"
        required: false

permissions:
  contents: read

jobs:
  meta:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.release.outputs.tag }}
      version: ${{ steps.release.outputs.version }}
      chart: ${{ steps.release.outputs.chart }}
      chart_asset: ${{ steps.release.outputs.chart_asset }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Resolve release metadata
        id: release
        shell: bash
        env:
          RELEASE_NAME: ${{ inputs.release_name }}
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            tag="${GITHUB_REF_NAME}"
          elif [[ -n "${RELEASE_NAME:-}" ]]; then
            tag="${RELEASE_NAME}"
          else
            version="$(awk '/^version:/ { print $2; exit }' charts/twenty/Chart.yaml)"
            tag="v${version}"
          fi

          if [[ ! "${tag}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([-+][0-9A-Za-z.-]+)?$ ]]; then
            echo "Release tag must look like v0.1.0: ${tag}" >&2
            exit 1
          fi

          version="${tag#v}"
          chart="$(awk '/^name:/ { print $2; exit }' charts/twenty/Chart.yaml)"
          chart_asset="${chart}-${version}.tgz"

          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "chart=${chart}" >> "${GITHUB_OUTPUT}"
          echo "chart_asset=${chart_asset}" >> "${GITHUB_OUTPUT}"

  release:
    needs: meta
    permissions:
      contents: write
    runs-on: ubuntu-latest
    outputs:
      chart_asset: ${{ steps.package.outputs.asset }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Install Helm
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4.3.1

      - name: Set up git-cliff
        uses: kenji-miyake/setup-git-cliff@2778609c643a39a2576c4bae2e493b855eb4aee8 # v2

      - name: Validate chart version
        shell: bash
        run: |
          chart_version="$(awk '/^version:/ { print $2; exit }' charts/twenty/Chart.yaml)"

          if [[ "${chart_version}" != "${{ needs.meta.outputs.version }}" ]]; then
            echo "Chart version ${chart_version} does not match ${{ needs.meta.outputs.tag }}" >&2
            exit 1
          fi

      - name: Package Helm chart
        id: package
        shell: bash
        run: |
          mkdir -p dist
          helm lint charts/twenty -f charts/twenty/values.production.example.yaml
          helm template twenty charts/twenty -f charts/twenty/values.production.example.yaml >/dev/null
          helm package charts/twenty --destination dist
          file="dist/${{ needs.meta.outputs.chart_asset }}"
          test -f "${file}"
          echo "file=${file}" >> "${GITHUB_OUTPUT}"
          echo "asset=${{ needs.meta.outputs.chart_asset }}" >> "${GITHUB_OUTPUT}"

      - name: Generate changelog
        id: changelog
        shell: bash
        run: |
          printf 'changelog<<EOF\n' >> "${GITHUB_OUTPUT}"
          if git rev-parse "${{ needs.meta.outputs.tag }}" >/dev/null 2>&1; then
            git cliff -l >> "${GITHUB_OUTPUT}"
          else
            git cliff --unreleased --tag "${{ needs.meta.outputs.tag }}" >> "${GITHUB_OUTPUT}"
          fi
          printf 'EOF\n' >> "${GITHUB_OUTPUT}"

      - name: Create GitHub Release and upload asset
        uses: softprops/action-gh-release@5be0e66d93ac7ed76da52eca8bb058f665c3a5fe # v2.4.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ needs.meta.outputs.tag }}
          name: ${{ needs.meta.outputs.tag }}
          body: ${{ steps.changelog.outputs.changelog }}
          draft: false
          prerelease: false
          files: ${{ steps.package.outputs.file }}
          overwrite_files: true
          make_latest: true

  update-registry:
    needs:
      - meta
      - release
    runs-on: ubuntu-latest
    steps:
      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349 # v2
        with:
          app-id: 2336325
          private-key: ${{ secrets.UPDATE_REGISTRY_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Trigger registry update
        uses: the-actions-org/workflow-dispatch@3133c5d135c7dbe4be4f9793872b6ef331b53bc7 # v4
        with:
          repo: "ammarlakis/helm-charts"
          workflow: Add Chart to Helm Repository
          ref: "master"
          wait-for-completion: false
          inputs: |
            {
              "repository": "${{ github.repository }}",
              "release_name": "${{ needs.meta.outputs.tag }}",
              "chart_asset": "${{ needs.release.outputs.chart_asset }}"
            }
          token: ${{ steps.app-token.outputs.token }}
